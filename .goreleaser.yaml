# .goreleaser.yaml
# See https://goreleaser.com for full documentation.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: standard
    binary: bluefin-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/hanthor/bluefin-cli/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: plus
    binary: bluefin-cli-plus
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=extra
    ldflags:
      - -s -w -X github.com/hanthor/bluefin-cli/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: hanthor
    name: bluefin-cli
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

winget:
  - name: BluefinCLI
    publisher: Hanthor
    publisher_url: "https://github.com/hanthor"
    publisher_support_url: "https://github.com/hanthor/bluefin-cli/issues"
    package_identifier: Hanthor.BluefinCLI
    license: Apache-2.0
    license_url: "https://github.com/hanthor/bluefin-cli/blob/master/LICENSE"
    copyright: "Copyright 2025 Hanthor"
    short_description: "Modern CLI for managing shell config and dev environment customization on Universal Blue."
    homepage: "https://github.com/hanthor/bluefin-cli"
    tags:
      - cli
      - shell
      - bluefin
      - universal-blue
    ids:
      - standard
    skip_upload: auto
    repository:
      owner: microsoft
      name: winget-pkgs
      branch: "bluefin-cli-{{.Version}}"
      token: "{{ .Env.WINGET_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
