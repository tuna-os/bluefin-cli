# .goreleaser.yaml
# See https://goreleaser.com for full documentation.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: standard
    binary: bluefin-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: plus
    binary: bluefin-cli-plus
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=extra
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: hanthor
    name: bluefin-cli
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
