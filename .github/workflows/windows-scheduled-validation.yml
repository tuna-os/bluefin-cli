name: Windows Scheduled Validation

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  windows-automation-check:
    name: Validate Windows Automation Paths
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Download dependencies
        shell: pwsh
        run: go mod download

      - name: Build Windows binary
        shell: pwsh
        run: go build -o bluefin-cli.exe .

      - name: Run PowerShell profile tests
        shell: pwsh
        run: go test -v ./internal/shell -run "PowerShell"

      - name: Run Windows install/wallpaper tests
        shell: pwsh
        run: go test -v ./internal/install -run "Windows|Wallpaper|Normalize|Theme"

      - name: Smoke check status command
        shell: pwsh
        run: .\bluefin-cli.exe status

      - name: Smoke check wallpapers help
        shell: pwsh
        run: .\bluefin-cli.exe wallpapers --help

      - name: Smoke check init output
        shell: pwsh
        run: |
          $out = .\bluefin-cli.exe init powershell
          if (-not $out) {
            throw "Expected init powershell to output shell init script"
          }
          if (-not ($out -match "bluefin-cli")) {
            throw "Expected init output to reference bluefin-cli"
          }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: .\bluefin-cli.exe cleanup
