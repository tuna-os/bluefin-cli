name: Windows Scheduled Validation

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  windows-automation-check:
    name: Validate Windows Automation Paths
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Download dependencies
        shell: pwsh
        run: go mod download

      - name: Run shell profile tests
        shell: pwsh
        run: go test -v ./internal/shell -run "PowerShell"

      - name: Run wallpaper automation tests
        shell: pwsh
        run: go test -v ./internal/install -run "ConfigureWindowsThemeAutomation|PowerShellTriggerScript|SplitTaskCommand|IsWindowsAccessDenied|SelectMonthlyWallpaper|SupportsMonthlyWallpapers"

      - name: Build Windows binary
        shell: pwsh
        run: go build -o bluefin-cli.exe .

      - name: Configure wallpaper automation (polling)
        shell: pwsh
        run: |
          .\bluefin-cli.exe install wallpapers bluefin-wallpapers --non-interactive --enable-mode-sync --enable-auto-dark-light --trigger-source polling

      - name: Assert scheduled tasks and startup run entry
        shell: pwsh
        run: |
          $syncTask = Get-ScheduledTask -TaskName "BluefinCLI-ThemeModeSync" -ErrorAction Stop
          $lightTask = Get-ScheduledTask -TaskName "BluefinCLI-SetLightAt6AM" -ErrorAction Stop
          $darkTask = Get-ScheduledTask -TaskName "BluefinCLI-SetDarkAt6PM" -ErrorAction Stop

          if (-not $syncTask) { throw "Missing BluefinCLI-ThemeModeSync task" }
          if (-not $lightTask) { throw "Missing BluefinCLI-SetLightAt6AM task" }
          if (-not $darkTask) { throw "Missing BluefinCLI-SetDarkAt6PM task" }

          $runKey = Get-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run" -Name "BluefinCLIThemeModeSync" -ErrorAction Stop
          if ([string]::IsNullOrWhiteSpace($runKey.BluefinCLIThemeModeSync)) {
            throw "HKCU Run entry BluefinCLIThemeModeSync is missing or empty"
          }

      - name: Smoke check init output
        shell: pwsh
        run: |
          $out = .\bluefin-cli.exe init powershell
          if ([string]::IsNullOrWhiteSpace($out)) {
            throw "Expected init powershell to output shell init script"
          }
          if ($out -notmatch "bluefin-cli") {
            throw "Expected init output to reference bluefin-cli"
          }

      - name: Cleanup created task artifacts
        if: always()
        shell: pwsh
        run: |
          .\bluefin-cli.exe install wallpapers cleanup
