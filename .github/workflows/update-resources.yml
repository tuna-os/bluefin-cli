name: Update Embedded Resources

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Update Brewfiles
        run: just update-resources

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update embedded Brewfiles and wallpaper cask list"
          title: "chore(deps): update embedded Brewfiles and wallpaper cask list"
          body: |
            This is an automated PR to update embedded resources:
            - Brewfiles in `internal/install/resources/brewfiles/` from `projectbluefin/common`
            - Wallpaper cask list in `internal/install/resources/wallpaper-casks.json` from `ublue-os/homebrew-tap`

            Manual update: `just update-resources`
          branch: chore/update-brewfiles
          base: main
          delete-branch: true
